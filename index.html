<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>PONG</h1>
        <div class="scoreboard">
            <div class="score">
                <p>Player</p>
                <p id="playerScore">0</p>
            </div>
            <div class="score">
                <p>Computer</p>
                <p id="computerScore">0</p>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div class="instructions">
            <p><strong>Controls:</strong> Mouse Y position or Arrow Keys (↑↓) to move left paddle</p>
            <p><strong>Goal:</strong> Bounce the ball past the computer's paddle to score!</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
